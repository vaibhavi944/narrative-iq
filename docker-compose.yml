services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: narrativeiq-backend
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - hf_cache:/root/.cache/huggingface

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: narrativeiq-frontend
    environment:
      NEXT_PUBLIC_API_URL: ""
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: narrativeiq-caddy
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_HOST: ${CADDY_HOST:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  hf_cache:
  caddy_data:
  caddy_config:
